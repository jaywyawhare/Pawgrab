<svg xmlns="http://www.w3.org/2000/svg" width="680" height="696" viewBox="0 0 680 696">
  <style>
    text{dominant-baseline:central}
    .bg{fill:#fff}
    .t{font:bold 18px 'Segoe UI',system-ui,sans-serif;fill:#1f2328}
    .sec{font:bold 11px 'Segoe UI',system-ui,sans-serif;fill:#8b949e;text-transform:uppercase;letter-spacing:.5px}
    .l{font:13px 'Segoe UI',system-ui,sans-serif;fill:#1f2328}
    .lh{font:bold 13px 'Segoe UI',system-ui,sans-serif;fill:#059669}
    .v{font:12px 'SFMono-Regular',Consolas,monospace;fill:#656d76}
    .vh{font:bold 12px 'SFMono-Regular',Consolas,monospace;fill:#059669}
    .n{font:10.5px 'Segoe UI',system-ui,sans-serif;fill:#94a3b8}
    .st{fill:#f8f9fb}
    .tk{fill:#edf0f4}
    .bh{fill:#10b981}
    .bs{fill:#8b5cf6}
    .bn{fill:#94a3b8}
    .div{stroke:#e5e7eb;stroke-width:1}
    @media(prefers-color-scheme:dark){
      .bg{fill:#0d1117}
      .t,.l{fill:#e6edf3}
      .lh{fill:#34d399}
      .v,.n,.sec{fill:#8b949e}
      .vh{fill:#34d399}
      .st{fill:#111922}
      .tk{fill:#1c2736}
      .bn{fill:#475569}
      .div{stroke:#21262d}
    }
    .b{transform-box:fill-box;transform-origin:left center;transform:scaleX(0);animation:g 1.2s cubic-bezier(.16,1,.3,1) forwards}
    @keyframes g{to{transform:scaleX(1)}}
    .d0{animation-delay:0.00s}
    .d1{animation-delay:0.07s}
    .d2{animation-delay:0.14s}
    .d3{animation-delay:0.21s}
    .d4{animation-delay:0.28s}
    .d5{animation-delay:0.35s}
    .d6{animation-delay:0.42s}
    .d7{animation-delay:0.49s}
    .d8{animation-delay:0.56s}
    .d9{animation-delay:0.63s}
    .d10{animation-delay:0.70s}
    .d11{animation-delay:0.77s}
    .d12{animation-delay:0.84s}
    .d13{animation-delay:0.91s}
    .d14{animation-delay:0.98s}
    .d15{animation-delay:1.05s}
  </style>
  <rect class="bg" width="680" height="696" rx="10"/>
  <text class="t" x="340" y="30" text-anchor="middle">Scraping Speed Comparison</text>
  <text class="sec" x="20" y="64">Single page</text>
  <text class="l" x="175" y="95" text-anchor="end">Playwright*</text>
  <rect class="tk" x="188" y="87" width="330" height="16" rx="3"/>
  <rect class="b bs d0" x="188" y="87" width="9" height="16" rx="3"/>
  <text class="v" x="662" y="95" text-anchor="end">101 ms</text>
  <rect class="st" x="0" y="112" width="680" height="34"/>
  <text class="lh" x="175" y="129" text-anchor="end">Pawgrab</text>
  <rect class="tk" x="188" y="121" width="330" height="16" rx="3"/>
  <rect class="b bh d1" x="188" y="121" width="47" height="16" rx="3"/>
  <text class="vh" x="662" y="129" text-anchor="end">504 ms</text>
  <text class="l" x="175" y="163" text-anchor="end">requests + BS4</text>
  <rect class="tk" x="188" y="155" width="330" height="16" rx="3"/>
  <rect class="b bn d2" x="188" y="155" width="106" height="16" rx="3"/>
  <text class="v" x="662" y="163" text-anchor="end">1,138 ms</text>
  <rect class="st" x="0" y="180" width="680" height="34"/>
  <text class="l" x="175" y="197" text-anchor="end">httpx + BS4</text>
  <rect class="tk" x="188" y="189" width="330" height="16" rx="3"/>
  <rect class="b bn d3" x="188" y="189" width="115" height="16" rx="3"/>
  <text class="v" x="662" y="197" text-anchor="end">1,233 ms</text>
  <text class="l" x="175" y="231" text-anchor="end">Scrapy</text>
  <rect class="tk" x="188" y="223" width="330" height="16" rx="3"/>
  <rect class="b bn d4" x="188" y="223" width="124" height="16" rx="3"/>
  <text class="v" x="662" y="231" text-anchor="end">1,327 ms</text>
  <rect class="st" x="0" y="248" width="680" height="34"/>
  <text class="l" x="175" y="265" text-anchor="end">trafilatura</text>
  <rect class="tk" x="188" y="257" width="330" height="16" rx="3"/>
  <rect class="b bn d5" x="188" y="257" width="126" height="16" rx="3"/>
  <text class="v" x="662" y="265" text-anchor="end">1,344 ms</text>
  <text class="l" x="175" y="299" text-anchor="end">Crawl4AI</text>
  <rect class="tk" x="188" y="291" width="330" height="16" rx="3"/>
  <rect class="b bn d6" x="188" y="291" width="240" height="16" rx="3"/>
  <text class="v" x="662" y="299" text-anchor="end">2,575 ms</text>
  <rect class="st" x="0" y="316" width="680" height="34"/>
  <text class="l" x="175" y="333" text-anchor="end">Selenium</text>
  <rect class="tk" x="188" y="325" width="330" height="16" rx="3"/>
  <rect class="b bn d7" x="188" y="325" width="330" height="16" rx="3"/>
  <text class="v" x="662" y="333" text-anchor="end">3,534 ms</text>
  <line class="div" x1="20" y1="358" x2="660" y2="358"/>
  <text class="sec" x="20" y="380">Multi-page</text>
  <text class="l" x="175" y="411" text-anchor="end">Playwright*</text>
  <rect class="tk" x="188" y="403" width="330" height="16" rx="3"/>
  <rect class="b bs d8" x="188" y="403" width="28" height="16" rx="3"/>
  <text class="v" x="662" y="411" text-anchor="end">887 ms</text>
  <rect class="st" x="0" y="428" width="680" height="34"/>
  <text class="lh" x="175" y="445" text-anchor="end">Pawgrab</text>
  <rect class="tk" x="188" y="437" width="330" height="16" rx="3"/>
  <rect class="b bh d9" x="188" y="437" width="51" height="16" rx="3"/>
  <text class="vh" x="662" y="445" text-anchor="end">1,646 ms</text>
  <text class="l" x="175" y="479" text-anchor="end">httpx (async) + BS4</text>
  <rect class="tk" x="188" y="471" width="330" height="16" rx="3"/>
  <rect class="b bn d10" x="188" y="471" width="98" height="16" rx="3"/>
  <text class="v" x="662" y="479" text-anchor="end">3,129 ms</text>
  <rect class="st" x="0" y="496" width="680" height="34"/>
  <text class="l" x="175" y="513" text-anchor="end">Scrapy</text>
  <rect class="tk" x="188" y="505" width="330" height="16" rx="3"/>
  <rect class="b bn d11" x="188" y="505" width="101" height="16" rx="3"/>
  <text class="v" x="662" y="513" text-anchor="end">3,238 ms</text>
  <text class="l" x="175" y="547" text-anchor="end">requests + BS4</text>
  <rect class="tk" x="188" y="539" width="330" height="16" rx="3"/>
  <rect class="b bn d12" x="188" y="539" width="109" height="16" rx="3"/>
  <text class="v" x="662" y="547" text-anchor="end">3,497 ms</text>
  <rect class="st" x="0" y="564" width="680" height="34"/>
  <text class="l" x="175" y="581" text-anchor="end">trafilatura</text>
  <rect class="tk" x="188" y="573" width="330" height="16" rx="3"/>
  <rect class="b bn d13" x="188" y="573" width="163" height="16" rx="3"/>
  <text class="v" x="662" y="581" text-anchor="end">5,221 ms</text>
  <text class="l" x="175" y="615" text-anchor="end">Selenium</text>
  <rect class="tk" x="188" y="607" width="330" height="16" rx="3"/>
  <rect class="b bn d14" x="188" y="607" width="252" height="16" rx="3"/>
  <text class="v" x="662" y="615" text-anchor="end">8,089 ms</text>
  <rect class="st" x="0" y="632" width="680" height="34"/>
  <text class="l" x="175" y="649" text-anchor="end">Crawl4AI</text>
  <rect class="tk" x="188" y="641" width="330" height="16" rx="3"/>
  <rect class="b bn d15" x="188" y="641" width="330" height="16" rx="3"/>
  <text class="v" x="662" y="649" text-anchor="end">10,586 ms</text>
  <text class="n" x="20" y="680">*Playwright reuses a warm browser page with no content extraction or anti-bot evasion.</text>
</svg>
